- name: variable preference
  hosts: local
  connection: local
  vars:
    NAME: "Ansible from play"
  vars_files:
    - course.yaml
  vars_prompt:
  - name: NAME
      prompt: "please enter name"
      private: false
  tasks:
  - name: print name
      vars:
        NAME: " ansible from task "
      ansible.buitin.debug:
        msg: "Hi {{ NAME }}"
