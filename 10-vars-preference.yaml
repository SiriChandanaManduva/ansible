- name: variable preference
  hosts: localhost
  connection: local
  vars:
    NAME: "Ansible from play"
  vars_files:
    - course.yaml
  vars_prompt:
    - name: NAME
      prompt: "please enter NAME"
      private: false
  tasks:
    - NAME: "print name"
      vars:
        NAME: " ansible from task "
      ansible.buitin.debug:
        msg: "Hi {{ NAME }}"
