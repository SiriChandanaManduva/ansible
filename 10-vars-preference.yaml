---
- name: variable preference
  hosts: localhost
  connection: local
  vars:
    NAME: "Ansible from play"
  vars_files:
  - course.yaml
  vars_prompt:
  - name: NAME
      prompt: "please enter NAME"
      private: false
  tasks:
  - name: print name
    vars:
      NAME: "Ansible from task "
    ansible.buitin.debug:
      msg: "Hi {{ NAME }}"
