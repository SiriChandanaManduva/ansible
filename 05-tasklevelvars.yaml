- name: play level variables
  hosts: local
  connection: local
  vars:
    course: "DevOps"
    Duration: "2 months"
    trainer: "Karthik Reddy"
  tasks:
    - name: print variables
      vars:
        course: "Ansible"
      debug:
        msg: "Course: {{ course }} Duration: {{ Duration }} Trainer: {{ trainer }}"
